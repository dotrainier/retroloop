<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>RetroLoop logo</title>
<desc>A tilted manila sticky note with a folded corner and a terracotta circular sync arrow looping behind and beneath it, on a warm off-white background</desc>

<rect x="0" y="0" width="680" height="680" fill="#ECE3D0"/>

<!-- loop shadow -->
<path d="M287 546 A155 155 0 1 1 393 546" fill="none" stroke="#23201A" stroke-width="24" stroke-linecap="round" opacity="0.14" transform="translate(8,10)"/>

<!-- note shadow -->
<rect x="192" y="180" width="296" height="296" rx="26" fill="#23201A" opacity="0.16" transform="rotate(-6 340 328) translate(10,14)"/>

<!-- loop (drawn behind the note) -->
<path d="M287 546 A155 155 0 1 1 393 546" fill="none" stroke="#C4472A" stroke-width="24" stroke-linecap="round"/>

<!-- sticky note -->
<g transform="rotate(-6 340 328)">
<rect x="192" y="180" width="296" height="296" rx="26" fill="#F4EBD6" stroke="#23201A" stroke-width="2" opacity="1"/>
<path d="M 418 180 L 488 180 L 488 250 Z" fill="#DCC9A0"/>
<path d="M 418 180 L 488 250" stroke="#23201A" stroke-width="2" opacity="0.35"/>
</g>

<!-- arrowhead, always on top -->
<path d="M 402 528 L 393 546 L 372 540 Z" fill="#C4472A"/>

</svg>
